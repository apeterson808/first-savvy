<!DOCTYPE html>
<html>
<head>
    <title>Clear Budgets</title>
</head>
<body>
    <h1>Clear Budget Data</h1>
    <button onclick="clearBudgets()">Clear All Budgets</button>
    <button onclick="clearBudgetGroups()">Clear All Budget Groups</button>
    <button onclick="clearAll()">Clear Everything</button>
    <pre id="output"></pre>

    <script type="module">
        import { createClient } from 'https://esm.sh/@base44/sdk';

        const base44 = createClient({
            appId: "691922f27f68103164a7760e",
            requiresAuth: false
        });

        const output = document.getElementById('output');

        window.clearBudgets = async function() {
            output.textContent = 'Fetching budgets...';
            const budgets = await base44.entities.Budget.list();
            output.textContent = `Found ${budgets.length} budgets. Deleting...\n`;

            for (const budget of budgets) {
                await base44.entities.Budget.delete(budget.id);
                output.textContent += `Deleted budget: ${budget.id}\n`;
            }

            output.textContent += '\nDone! All budgets deleted.';
        };

        window.clearBudgetGroups = async function() {
            output.textContent = 'Fetching budget groups...';
            const groups = await base44.entities.BudgetGroup.list();
            output.textContent = `Found ${groups.length} budget groups. Deleting...\n`;

            for (const group of groups) {
                await base44.entities.BudgetGroup.delete(group.id);
                output.textContent += `Deleted group: ${group.id}\n`;
            }

            output.textContent += '\nDone! All budget groups deleted.';
        };

        window.clearAll = async function() {
            output.textContent = 'Clearing all budget data...\n';

            // Delete budgets first
            const budgets = await base44.entities.Budget.list();
            output.textContent += `Found ${budgets.length} budgets. Deleting...\n`;
            for (const budget of budgets) {
                await base44.entities.Budget.delete(budget.id);
                output.textContent += `Deleted budget: ${budget.id}\n`;
            }

            // Then delete groups
            const groups = await base44.entities.BudgetGroup.list();
            output.textContent += `\nFound ${groups.length} budget groups. Deleting...\n`;
            for (const group of groups) {
                await base44.entities.BudgetGroup.delete(group.id);
                output.textContent += `Deleted group: ${group.id}\n`;
            }

            output.textContent += '\nDone! All budget data cleared.';
        };
    </script>
</body>
</html>
